{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Delete Note</title>
    <link rel="stylesheet" href="{% static 'notes_app/style.css' %}">
</head>
<body>
    <h1>Delete Note</h1>
    <p>Are you sure you want to delete "{{ note.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>
    <a href="{% url 'note_list' %}">Cancel</a>
</body>
</html>
