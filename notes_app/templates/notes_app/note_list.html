{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes</title>
    <link rel="stylesheet" href="{% static 'notes_app/style.css' %}">
</head>
<body>
    <h1>My Sticky Notes</h1>
    <a class="button" href="{% url 'note_create' %}">+ Create New Note</a>
    <div class="notes-grid">
        {% for note in notes %}
            <div class="note">
                <h2>{{ note.title }}</h2>
                <p>{{ note.content }}</p>
                <a class="edit" href="{% url 'note_update' note.pk %}">Edit</a>
                <a class="delete" href="{% url 'note_delete' note.pk %}">Delete</a>
            </div>
        {% empty %}
            <p>No notes yet. Click "Create New Note" to add one!</p>
        {% endfor %}
    </div>
</body>
</html>
